name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Lint/format check — placeholder for spotless
      - name: Lint and Format Check
        run: echo "Linting check placeholder - will wire up spotless later"

      # 2. Unresolved marker grep — fails if any // STUB: remains in Java source
      - name: Check for unresolved STUBs
        run: |
          if grep -rnw --include='*.java' . -e 'STUB:'; then
            echo "Error: Found unresolved 'STUB:' markers in Java source. Fix them before merging."
            exit 1
          else
            echo "No STUB markers found in Java source. Clean!"
          fi

      # 3. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 4. Dependency vulnerability scan — placeholder for OWASP
      - name: Dependency Check
        run: echo "Dependency vulnerability scan placeholder"

      # 5. Unit & Integration Tests
      - name: Run Tests
        run: mvn test --no-transfer-progress

      # 6. Build verification — placeholder for Docker
      - name: Verify Docker Build
        run: echo "Docker build verification placeholder"
