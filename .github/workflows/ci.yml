name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Lint/format check — fails fast if code isn't formatted correctly
      # We'll use spotless or similar later, placeholder for now
      - name: Lint and Format Check
        run: echo "Linting check placeholder - will fail fast if format is wrong"

      # 2. Secret scan — prevents committing .env values or keys
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Unresolved marker grep — fails if any // STUB: remains in Java source
      # Only searches .java files to avoid false positives from docs/CI config.
      - name: Check for unresolved STUBs
        run: |
          if grep -rnw --include='*.java' . -e 'STUB:'; then
            echo "Error: Found unresolved 'STUB:' markers in Java source. Fix them before merging."
            exit 1
          else
            echo "No STUB markers found in Java source. Clean!"
          fi

      # Setup Java 21 for the Maven steps
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 4. Dependency vulnerability scan
      - name: Dependency Check
        run: echo "Dependency vulnerability scan placeholder"
        # We'll wire up org.owasp:dependency-check-maven here later

      # 5 & 6. Unit & Integration Tests 
      # Runs ArchUnit (domain purity) and domain tests (state machine).
      # No database needed — these are pure Java tests.
      - name: Run Tests
        run: mvn test --no-transfer-progress

      # 7. Build Docker Image (Dry Run / Multi-stage build check)
      - name: Verify Docker Build
        run: echo "Docker build verification placeholder"
        
      # Step 8 (Deploy to Render) will be added in Phase 9, strictly on push to main.
