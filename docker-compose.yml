# Nexus — Local Development Services
# Start with: docker compose up -d
# Stop with:  docker compose down
# Reset data:  docker compose down -v  (deletes volumes = deletes all data)

services:

  # ─── PostgreSQL with pgvector extension ───────────────────────────
  # The main database. pgvector image adds vector-similarity search
  # on top of standard Postgres 16 — needed for RAG/embeddings in Phase 4.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_local}
    ports:
      - "5432:5432"
    volumes:
      - nexus-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────
  # Used for caching (Phase 6) and rate-limit counters (Phase 6).
  # In production this will be Upstash Redis; locally we run our own.
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Kafka (single broker, dev only) ──────────────────────────────
  # Used for ticket lifecycle events (Phase 5).
  # KRaft mode = no separate ZooKeeper needed (Kafka 3.x+).
  kafka:
    image: apache/kafka:3.8.0
    container_name: nexus-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: nexus-local-dev-cluster-001
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  nexus-pg-data:
  nexus-redis-data:
