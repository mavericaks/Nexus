# Nexus — Dev Profile
# Activated with: --spring.profiles.active=dev
# Connects to the local Docker Compose services (docker compose up -d).

spring:
  # ─── Datasource — points at local Docker Compose Postgres ──────────
  datasource:
    # Matches docker-compose.yml defaults:
    #   POSTGRES_DB=nexus, POSTGRES_USER=nexus, POSTGRES_PASSWORD=nexus_local
    url: jdbc:postgresql://localhost:5432/nexus
    username: nexus
    password: nexus_local
    driver-class-name: org.postgresql.Driver

  # ─── JPA dev overrides ─────────────────────────────────────────────
  jpa:
    # Show the SQL Hibernate generates — noisy, but invaluable for
    # catching N+1 queries and understanding what JPA actually does.
    show-sql: true
    properties:
      hibernate:
        # Pretty-print the SQL so it's readable in the console.
        format_sql: true

  # ─── Flyway dev overrides ──────────────────────────────────────────
  flyway:
    # In dev, wipe and re-run all migrations if they get out of sync.
    # NEVER enable this in prod — it drops the entire schema first.
    clean-disabled: false
