# Nexus — Dev Profile
# Activated with: --spring.profiles.active=dev
# Connects to the local Docker Compose services (docker compose up -d).

spring:
  # ─── Datasource — the RUNNING APP connects as nexus_app ────────────
  # This is the low-privilege role created by V2__rls_policies.sql.
  # RLS policies filter its queries by tenant_id automatically.
  # Port 15432 = Docker Compose host port (avoids Hyper-V conflicts).
  datasource:
    url: jdbc:postgresql://localhost:15432/nexus
    username: nexus_app
    password: nexus_app_local
    driver-class-name: org.postgresql.Driver

  # ─── JPA dev overrides ─────────────────────────────────────────────
  jpa:
    # Show the SQL Hibernate generates — noisy, but invaluable for
    # catching N+1 queries and understanding what JPA actually does.
    show-sql: true
    properties:
      hibernate:
        # Pretty-print the SQL so it's readable in the console.
        format_sql: true

  # ─── Flyway — runs as the OWNER role (nexus), not the app role ─────
  # Flyway needs DDL privileges to create/alter tables.
  # The app role (nexus_app) only has CRUD permissions.
  flyway:
    url: jdbc:postgresql://localhost:15432/nexus
    user: nexus
    password: nexus_local
    # In dev, wipe and re-run all migrations if they get out of sync.
    # NEVER enable this in prod — it drops the entire schema first.
    clean-disabled: false
